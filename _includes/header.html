<!-- header -->
<header>

  <div>
    
    <a href="{{ site.baseurl }}/" id="header">
      <figure><img src="../images/gnew.png"></figure>
    </a>

    <nav>
      <div class="trigger">
        {% for my_page in site.pages %}
        {% if my_page.title %}
        <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
        {% endif %}
        {% endfor %}
      </div>
    </nav>    

  </div>
  
</header>
